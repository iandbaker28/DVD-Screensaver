server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/javascript;

    location / {
        try_files $uri $uri/ =404;
    }

    # config.js is meant to be edited/bind-mounted at deploy time; never
    # let browsers cache a stale API base URL.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
